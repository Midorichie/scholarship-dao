[project]
name = "scholarship-dao"
version = "2.0.0"
description = "Enhanced Scholarship DAO with governance and security improvements"
authors = ["Your Name <your.email@example.com>"]
license = "MIT"
keywords = ["dao", "scholarship", "governance", "clarity", "stacks"]
 
[contracts.scholarship-dao]
path = "contracts/scholarship-dao.clar"
clarity_version = 1
epoch = "2.05"
 
[contracts.governance]
path = "contracts/governance.clar"
clarity_version = 1
epoch = "2.05"
 
[repl]
costs_version = 2
parser_version = 2
 
[repl.analysis]
passes = ["check_checker"]
 
[repl.analysis.check_checker]
strict = true
trusted_sender = false
trusted_caller = false
callee_filter = false
 
# Network configurations
[network]
name = "testnet"
node_rpc_address = "https://stacks-node-api.testnet.stacks.co"
 
[network.deployment]
generate_missing_constructors = true
serialize_constructors = true
 
# Test configuration
[test]
timeout = 30000
 
# Development settings
[dev]
stacks_node_rpc_address = "http://localhost:20443"
bitcoin_node_rpc_address = "http://localhost:18443"
bitcoin_node_rpc_username = "btc"
bitcoin_node_rpc_password = "btc"
 
